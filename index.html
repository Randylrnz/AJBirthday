<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alora Jasleigh Lorenzo – Baptism &amp; 1st Birthday</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --ground: #FEF3F8;
      --text: #3D1A3A;
      --rose: #E05580;
      --lav: #9B6EC8;
      --gold: #C8942A;
      --cream: #FFFAF6;
      --cover: #2D1230;
      --muted: #B898B0;
      --shadow: rgba(45, 18, 48, .32);
      --f-script: 'Dancing Script', cursive;
      --f-serif: 'Cormorant Garamond', Georgia, serif;
      --f-sans: 'Montserrat', 'Arial', sans-serif;
      --bw: 880px;
      --bh: 560px;
      --pw: 440px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: var(--f-sans);
      background: radial-gradient(ellipse 120% 80% at 50% 20%, #2B0D4A 0%, #130524 40%, #060212 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── STARFIELD ── */
    .stars-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--td, 2s) ease-in-out var(--tl, 0s) infinite;
    }

    @keyframes twinkle {

      0%,
      100% {
        opacity: var(--ta, .1);
        transform: scale(1);
      }

      50% {
        opacity: var(--tb, .9);
        transform: scale(1.4);
      }
    }

    /* ── FIREFLIES ── */
    .ff-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .fly {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(220, 255, 160, 1), rgba(180, 255, 100, .5), transparent);
      box-shadow: 0 0 6px 2px rgba(200, 255, 120, .6);
      animation: flyMove var(--fd, 8s) ease-in-out var(--fl, 0s) infinite;
    }

    @keyframes flyMove {
      0% {
        transform: translate(0, 0);
        opacity: 0;
      }

      10% {
        opacity: .9;
      }

      45% {
        transform: translate(var(--fx, 40px), var(--fy, -50px));
        opacity: .7;
      }

      80% {
        transform: translate(var(--fx2, -20px), var(--fy2, -90px));
        opacity: .4;
      }

      100% {
        transform: translate(var(--fx3, 10px), var(--fy3, -120px));
        opacity: 0;
      }
    }

    /* ── MOON ── */
    .moon {
      position: fixed;
      top: 4vh;
      right: 8vw;
      width: 70px;
      height: 70px;
      z-index: 0;
      pointer-events: none;
      background: radial-gradient(circle at 35% 35%, #FFF8DC, #FFE88A, #E8C84A);
      border-radius: 50%;
      box-shadow: 0 0 20px 8px rgba(255, 232, 100, .25), 0 0 60px 20px rgba(255, 210, 60, .1);
      animation: moonGlow 4s ease-in-out infinite;
    }

    @keyframes moonGlow {

      0%,
      100% {
        box-shadow: 0 0 20px 8px rgba(255, 232, 100, .25), 0 0 60px 20px rgba(255, 210, 60, .1);
      }

      50% {
        box-shadow: 0 0 30px 14px rgba(255, 232, 100, .35), 0 0 80px 30px rgba(255, 210, 60, .15);
      }
    }

    /* ── AMBIENT BG ── */
    .bg-bflies {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .abf {
      position: absolute;
      animation: afloat linear infinite;
    }

    .abf svg {
      width: 100%;
      height: 100%;
    }

    .awl {
      transform-origin: 100% 55%;
      animation: aflapL .55s ease-in-out infinite;
    }

    .awr {
      transform-origin: 0% 55%;
      animation: aflapR .55s ease-in-out infinite;
    }

    @keyframes aflapL {

      0%,
      100% {
        transform: scaleX(1);
      }

      50% {
        transform: scaleX(.1);
      }
    }

    @keyframes aflapR {

      0%,
      100% {
        transform: scaleX(1);
      }

      50% {
        transform: scaleX(.1);
      }
    }

    @keyframes afloat {
      0% {
        transform: translate(-80px, var(--sy));
        opacity: 0;
      }

      6% {
        opacity: var(--op, .5);
      }

      94% {
        opacity: var(--op, .5);
      }

      100% {
        transform: translate(calc(100vw + 80px), var(--ey));
        opacity: 0;
      }
    }

    /* ── SCENE ── */
    .scene {
      position: relative;
      z-index: 2;
      perspective: 3500px;
      perspective-origin: 50% 42%;
      padding: 20px;
    }

    .book-wrap {
      position: relative;
    }

    /* ── BOOK ── */
    .book {
      position: relative;
      width: var(--bw);
      height: var(--bh);
      transform-style: preserve-3d;
      filter: drop-shadow(0 28px 60px var(--shadow));
    }

    /* Page base */
    .pg {
      position: absolute;
      top: 0;
      width: var(--pw);
      height: var(--bh);
      background:
        radial-gradient(ellipse 60% 40% at 15% 90%, rgba(200, 148, 42, .04), transparent),
        radial-gradient(ellipse 50% 30% at 85% 10%, rgba(224, 85, 128, .04), transparent),
        linear-gradient(170deg, #FFFDF8 0%, #FFF7F2 50%, #FFF4F9 100%);
      overflow: hidden;
    }

    .pg-l {
      left: 0;
      border-radius: 6px 0 0 6px;
      border: 1px solid rgba(200, 148, 42, .3);
      border-right: none;
      box-shadow: inset -18px 0 36px rgba(0, 0, 0, .07), 2px 0 4px rgba(0, 0, 0, .04);
    }

    .pg-r {
      right: 0;
      border-radius: 0 6px 6px 0;
      border: 1px solid rgba(200, 148, 42, .3);
      border-left: none;
      box-shadow: inset 18px 0 36px rgba(0, 0, 0, .07), -2px 0 4px rgba(0, 0, 0, .04);
    }

    /* Spine */
    .spine {
      position: absolute;
      left: calc(50% - 2px);
      top: 0;
      width: 4px;
      height: 100%;
      z-index: 6;
      background: linear-gradient(to right,
          rgba(200, 148, 42, .7),
          rgba(255, 245, 220, .9),
          rgba(200, 148, 42, .7));
    }

    /* Flipper */
    .flipper {
      position: absolute;
      top: 0;
      height: var(--bh);
      width: var(--pw);
      transform-style: preserve-3d;
      z-index: 10;
      display: none;
    }

    .f-side {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      background: var(--cream);
      overflow: hidden;
    }

    .f-back {
      transform: rotateY(180deg);
    }

    /* Book edge depth */
    .book::before {
      content: '';
      position: absolute;
      right: -5px;
      top: 3px;
      width: 5px;
      height: calc(100% - 6px);
      background: linear-gradient(to right, rgba(200, 148, 42, .5), rgba(255, 240, 200, .8), rgba(200, 148, 42, .4));
      border-radius: 0 3px 3px 0;
    }

    .book::after {
      content: '';
      position: absolute;
      bottom: -18px;
      left: 3%;
      width: 94%;
      height: 24px;
      background: radial-gradient(ellipse at center, rgba(45, 18, 48, .45) 0%, transparent 70%);
    }

    /* ── NAV ── */
    .nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 46px;
      height: 46px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, .92);
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 18px rgba(45, 18, 48, .28);
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .2s, box-shadow .2s, opacity .2s;
      z-index: 30;
      color: var(--text);
    }

    .nav:hover:not(:disabled) {
      transform: translateY(-50%) scale(1.12);
      box-shadow: 0 8px 28px rgba(45, 18, 48, .35);
    }

    .nav:disabled {
      opacity: .28;
      cursor: default;
    }

    .nav-l {
      left: -62px;
    }

    .nav-r {
      right: -62px;
    }

    /* Page indicator */
    .pg-ind {
      position: absolute;
      bottom: -36px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 7px;
      align-items: center;
    }

    .pg-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .35);
      transition: background .3s, transform .3s;
      cursor: pointer;
    }

    .pg-dot.on {
      background: rgba(255, 255, 255, .9);
      transform: scale(1.3);
    }

    /* ── PAGE CONTENT SHARED ── */
    .pc {
      padding: 28px 26px;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .pc h1 {
      font-family: var(--f-script);
      color: var(--text);
    }

    .pc h2 {
      font-family: var(--f-serif);
      font-style: italic;
      color: var(--text);
    }

    .divl {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
    }

    .divl-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200, 148, 42, .5));
    }

    .divl-line.r {
      background: linear-gradient(90deg, rgba(200, 148, 42, .5), transparent);
    }

    .divl-dia {
      width: 6px;
      height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
    }

    /* ── COVER LEFT ── */
    .cvl {
      background: repeating-linear-gradient(45deg, rgba(224, 85, 128, .04) 0, rgba(224, 85, 128, .04) 1px, transparent 1px, transparent 12px),
        repeating-linear-gradient(-45deg, rgba(155, 110, 200, .04) 0, rgba(155, 110, 200, .04) 1px, transparent 1px, transparent 12px),
        var(--cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .cvl-border {
      position: absolute;
      inset: 12px;
      border: 1px solid rgba(200, 148, 42, .2);
      border-radius: 4px;
      pointer-events: none;
    }

    /* ── COVER RIGHT ── */
    .cvr {
      background: linear-gradient(155deg, #2D1230 0%, #4A1E48 55%, #2D1230 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px 28px;
      position: relative;
      overflow: hidden;
    }

    .cvr::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 70% at 50% 40%, rgba(224, 85, 128, .15), transparent);
    }

    .cvr-border {
      position: absolute;
      inset: 14px;
      border: 1px solid rgba(200, 148, 42, .4);
      border-radius: 4px;
      pointer-events: none;
    }

    .cvr-corner {
      position: absolute;
      font-size: .9rem;
      opacity: .6;
    }

    .cvr-corner.tl {
      top: 20px;
      left: 20px;
    }

    .cvr-corner.tr {
      top: 20px;
      right: 20px;
    }

    .cvr-corner.bl {
      bottom: 20px;
      left: 20px;
    }

    .cvr-corner.br {
      bottom: 20px;
      right: 20px;
    }

    /* ── DETAIL ITEMS ── */
    .dtl {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      margin: 5px 0;
    }

    .dtl-ico {
      font-size: 1rem;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .dtl-body {}

    .dtl-lbl {
      font-size: .62rem;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }

    .dtl-val {
      font-family: var(--f-serif);
      font-size: 1rem;
      color: var(--text);
    }

    .dtl-sub {
      font-size: .8rem;
      color: var(--muted);
    }

    /* ── COUNTDOWN ── */
    .cd-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 12px 0;
    }

    .cd-box {
      background: rgba(255, 255, 255, .7);
      border: 1px solid rgba(200, 148, 42, .25);
      border-radius: 10px;
      padding: 10px 12px;
      text-align: center;
      min-width: 72px;
      box-shadow: 0 2px 10px rgba(61, 26, 58, .08);
    }

    .cd-n {
      font-family: var(--f-script);
      font-size: 2.4rem;
      color: var(--rose);
      line-height: 1;
      display: block;
    }

    .cd-l {
      font-size: .58rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── RSVP BTNS ── */
    .rsvp-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin: 12px 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 18px;
      border: none;
      border-radius: 50px;
      font-family: var(--f-sans);
      font-size: .82rem;
      font-weight: 700;
      letter-spacing: .04em;
      cursor: pointer;
      text-decoration: none;
      transition: transform .25s, box-shadow .25s;
    }

    .btn:active {
      transform: scale(.96) !important;
    }

    .btn-rose {
      background: linear-gradient(135deg, var(--rose), var(--lav));
      color: #fff;
      box-shadow: 0 4px 14px rgba(224, 85, 128, .3);
    }

    .btn-rose:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 22px rgba(224, 85, 128, .38);
    }

    .btn-out {
      background: rgba(255, 255, 255, .8);
      color: var(--text);
      border: 1.5px solid rgba(155, 110, 200, .35);
    }

    .btn-out:hover {
      transform: translateY(-1px);
      border-color: var(--lav);
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid rgba(224, 85, 128, .25);
      font-size: .78rem;
    }

    .btn-ghost:hover {
      background: rgba(224, 85, 128, .06);
    }

    .btn-sm {
      padding: 8px 16px;
      font-size: .78rem;
    }

    /* ── GUEST SEARCH ── */
    .gs-wrap {
      position: relative;
    }

    .gs-inp {
      width: 100%;
      padding: 9px 14px 9px 36px;
      background: rgba(255, 255, 255, .75);
      border: 1.5px solid rgba(224, 85, 128, .3);
      border-radius: 50px;
      font-family: var(--f-sans);
      font-size: .82rem;
      color: var(--text);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    .gs-inp::placeholder {
      color: var(--muted);
    }

    .gs-inp:focus {
      border-color: var(--rose);
      box-shadow: 0 0 0 3px rgba(224, 85, 128, .1);
    }

    .gs-ico {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      font-size: .85rem;
      pointer-events: none;
    }

    .gs-drop {
      position: absolute;
      top: calc(100%+4px);
      left: 0;
      right: 0;
      background: rgba(255, 250, 246, .97);
      border: 1px solid rgba(224, 85, 128, .2);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(61, 26, 58, .12);
      max-height: 160px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }

    .gs-drop.on {
      display: block;
    }

    .gs-opt {
      padding: 8px 14px;
      cursor: pointer;
      font-size: .82rem;
      color: var(--text);
      border-bottom: 1px solid rgba(224, 85, 128, .1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background .15s;
    }

    .gs-opt:last-child {
      border-bottom: none;
    }

    .gs-opt:hover {
      background: rgba(224, 85, 128, .07);
    }

    .bdg {
      font-size: .6rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 20px;
    }

    .b-ninong {
      background: #EAF3FD;
      color: #2574AB;
    }

    .b-ninang {
      background: #FDEAF3;
      color: #BF3570;
    }

    .b-witness {
      background: #EDFAE8;
      color: #2A8C50;
    }

    .b-family {
      background: #FDF2E8;
      color: #C06A20;
    }

    /* ── RSVP RESULT ── */
    .rr {
      display: none;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      margin-top: 8px;
    }

    .rr.on {
      display: block;
    }

    .rr.confirmed {
      background: rgba(224, 85, 128, .08);
      border: 1px solid rgba(224, 85, 128, .2);
    }

    .rr.maybe {
      background: rgba(155, 110, 200, .08);
      border: 1px solid rgba(155, 110, 200, .2);
    }

    .rr.declined {
      background: rgba(0, 0, 0, .04);
      border: 1px solid rgba(0, 0, 0, .1);
    }

    .rr-title {
      font-family: var(--f-serif);
      font-style: italic;
      font-size: 1rem;
      color: var(--text);
    }

    .rr-links {
      display: flex;
      gap: 7px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    /* ── MAP ── */
    .map-box {
      border-radius: 10px;
      overflow: hidden;
      border: 1.5px solid rgba(200, 148, 42, .25);
      margin: 10px 0;
    }

    .map-box iframe {
      display: block;
      width: 100%;
      border: none;
    }

    /* ── CALENDAR DATE CARD ── */
    .date-card {
      background: linear-gradient(135deg, rgba(224, 85, 128, .1), rgba(155, 110, 200, .1));
      border: 1px solid rgba(200, 148, 42, .3);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
      margin: 10px 0;
    }

    .date-card .month {
      font-size: .7rem;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }

    .date-card .day-n {
      font-family: var(--f-script);
      font-size: 3.5rem;
      color: var(--rose);
      line-height: 1;
    }

    .date-card .year {
      font-family: var(--f-serif);
      font-style: italic;
      color: var(--text);
      font-size: 1rem;
    }

    /* ── MESSAGES ── */
    .mf {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .fi,
    .fa {
      width: 100%;
      padding: 8px 12px;
      background: rgba(255, 255, 255, .7);
      border: 1.5px solid rgba(224, 85, 128, .22);
      border-radius: 8px;
      font-family: var(--f-sans);
      font-size: .8rem;
      color: var(--text);
      outline: none;
      transition: border-color .2s;
    }

    .fi::placeholder,
    .fa::placeholder {
      color: var(--muted);
    }

    .fi:focus,
    .fa:focus {
      border-color: var(--rose);
    }

    .fa {
      min-height: 60px;
      resize: none;
    }

    .mc {
      background: rgba(255, 255, 255, .6);
      border: 1px solid rgba(224, 85, 128, .15);
      border-radius: 8px;
      padding: 8px 10px;
      margin-top: 6px;
      font-family: var(--f-serif);
      font-size: .85rem;
    }

    .mc-auth {
      font-family: var(--f-script);
      color: var(--text);
      font-size: 1rem;
    }

    .mc-txt {
      font-style: italic;
      color: var(--muted);
    }

    /* ── MODAL ── */
    .mOv {
      position: fixed;
      inset: 0;
      background: rgba(45, 18, 48, .5);
      backdrop-filter: blur(10px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      visibility: hidden;
      transition: opacity .3s, visibility .3s;
    }

    .mOv.on {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: linear-gradient(150deg, #fff, #FEF3F8);
      border-radius: 20px;
      padding: 36px 30px;
      max-width: 460px;
      width: 100%;
      text-align: center;
      box-shadow: 0 24px 80px rgba(45, 18, 48, .2);
      border: 1px solid rgba(224, 85, 128, .2);
      transform: scale(.88);
      transition: transform .32s cubic-bezier(.34, 1.56, .64, 1);
      position: relative;
      max-height: 90vh;
      overflow-y: auto;
    }

    .mOv.on .modal {
      transform: scale(1);
    }

    .m-ico {
      font-size: 3.5rem;
      margin-bottom: 10px;
    }

    .m-ttl {
      font-family: var(--f-script);
      font-size: 2rem;
      color: var(--text);
      margin-bottom: 6px;
    }

    .m-msg {
      font-family: var(--f-serif);
      font-style: italic;
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 22px;
    }

    .m-acts {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .m-x {
      position: absolute;
      top: 12px;
      right: 14px;
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: var(--muted);
    }

    .pg-num {
      position: absolute;
      bottom: 10px;
      font-size: .62rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
    }

      left: 18px;
    }

    .pg-num.r {
      right: 18px;
    }

    /* ── SPARKLE ── */
    .sp-layer {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .spk {
      position: absolute;
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      animation: spkA var(--sd, 1.5s) ease-in-out var(--sl, 0s) forwards;
    }

    @keyframes spkA {
      0% {
        transform: scale(0) rotate(0deg);
        opacity: 0;
      }

      30% {
        transform: scale(1.2) rotate(70deg);
        opacity: 1;
      }

      70% {
        transform: scale(.9) rotate(140deg);
        opacity: .6;
      }

      100% {
        transform: scale(0) rotate(210deg);
        opacity: 0;
      }
    }

    /* ── MUSIC PLAYER ── */
    .music-player {
      position: fixed;
      bottom: 18px;
      right: 18px;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(45, 18, 48, .82);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(200, 148, 42, .35);
      border-radius: 50px;
      padding: 8px 16px 8px 10px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .38), 0 0 0 1px rgba(200, 148, 42, .1);
      transition: box-shadow .3s;
    }

    .music-player:hover {
      box-shadow: 0 10px 40px rgba(0, 0, 0, .48), 0 0 0 1px rgba(200, 148, 42, .25);
    }

    .mp-btn {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--rose), var(--lav));
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .2s, box-shadow .2s;
      flex-shrink: 0;
      box-shadow: 0 3px 10px rgba(224, 85, 128, .35);
    }

    .mp-btn:hover {
      transform: scale(1.12);
      box-shadow: 0 5px 16px rgba(224, 85, 128, .5);
    }

    .mp-info {
      display: flex;
      flex-direction: column;
      gap: 1px;
      overflow: hidden;
      max-width: 160px;
    }

    .mp-title {
      font-family: var(--f-serif);
      font-style: italic;
      font-size: .7rem;
      color: rgba(255, 232, 200, .9);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mp-sub {
      font-size: .58rem;
      color: rgba(255, 255, 255, .4);
      letter-spacing: .05em;
    }

    .mp-vol {
      width: 56px;
      height: 3px;
      accent-color: var(--rose);
      cursor: pointer;
    }

    /* ── RESPONSIVE – tablet ── */
    @media(max-width:960px) {
      :root {
        --bw: 740px;
        --bh: 510px;
        --pw: 370px;
      }

      .nav-l {
        left: -54px;
      }

      .nav-r {
        right: -54px;
      }
    }

    /* ══════════════════════════════════════════════
   MOBILE  ≤ 700px — fixed-height card view
   One page at a time, fixed 520px tall card,
   content scrolls silently inside.
══════════════════════════════════════════════ */
    @media(max-width:700px) {
      :root {
        --bw: min(calc(100vw - 24px), 400px);
        --bh: 520px;
        /* FIXED — no distortion */
        --pw: var(--bw);
      }

      /* Center the card in the viewport */
      body {
        overflow: hidden;
        justify-content: center;
        align-items: center;
      }

      /* Remove book perspective — we're not 3D flipping */
      .scene {
        padding: 0;
        perspective: none;
      }

      /* Hide left page + 3D elements */
      .pg-l {
        display: none !important;
      }

      .flipper {
        display: none !important;
      }

      .spine,
      .book::before,
      .book::after {
        display: none;
      }

      /* Book = exact card dimensions */
      .book {
        width: var(--bw);
        height: var(--bh);
      }

      /* Right page = full-width fixed-height card */
      .pg-r {
        position: absolute !important;
        left: 0 !important;
        top: 0 !important;
        width: var(--pw) !important;
        height: var(--bh) !important;
        border-radius: 16px !important;
        border: 1.5px solid rgba(200, 148, 42, .32) !important;
        box-shadow:
          0 2px 0 rgba(200, 148, 42, .15),
          0 16px 60px rgba(61, 26, 58, .38),
          inset 0 1px 0 rgba(255, 255, 255, .6) !important;
        overflow-y: auto !important;
        overflow-x: hidden !important;
        /* hide scrollbar — swiping navigates pages */
        scrollbar-width: none !important;
      }

      .pg-r::-webkit-scrollbar {
        display: none;
      }

      /* Nav arrows: float inside the card on each edge */
      .nav {
        width: 38px;
        height: 38px;
        font-size: 1.1rem;
        background: rgba(255, 250, 246, .88);
        box-shadow: 0 3px 14px rgba(61, 26, 58, .22);
      }

      .nav-l {
        left: 10px;
      }

      .nav-r {
        right: 10px;
      }

      /* Dot strip: pill floating at the card bottom */
      .pg-ind {
        position: absolute;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 30;
        gap: 6px;
        background: rgba(255, 250, 246, .72);
        backdrop-filter: blur(8px);
        padding: 5px 12px;
        border-radius: 20px;
        border: 1px solid rgba(200, 148, 42, .2);
      }

      .pg-dot {
        width: 5px;
        height: 5px;
        background: rgba(61, 26, 58, .2);
      }

      .pg-dot.on {
        background: var(--rose);
        transform: scale(1.35);
      }

      /* Page content: padding-bottom so dots don't cover text */
      .pc {
        padding: 24px 20px 52px;
      }

      /* Countdown adjustments */
      .cd-row {
        gap: 6px;
      }

      .cd-box {
        min-width: 62px;
        padding: 9px 8px;
      }

      .cd-n {
        font-size: 2.2rem;
      }

      /* Moon: smaller on mobile */
      .moon {
        width: 42px;
        height: 42px;
        top: 2vh;
        right: 3vw;
      }

      /* Page transition animations */
      @keyframes mSlideUp {
        from {
          opacity: 0;
          transform: translateY(18px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes mSlideDown {
        from {
          opacity: 0;
          transform: translateY(-18px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .mob-slide-up .pg-r {
        animation: mSlideUp .26s cubic-bezier(.25, .46, .45, .94) both;
      }

      .mob-slide-down .pg-r {
        animation: mSlideDown .26s cubic-bezier(.25, .46, .45, .94) both;
      }
    }

    /* Very narrow phones (iPhone SE, Galaxy S5 etc.) */
    @media(max-width:380px) {
      :root {
        --bw: calc(100vw - 16px);
        --pw: var(--bw);
      }

      .pc {
        padding: 20px 16px 52px;
      }
    }

    /* Landscape phones: shrink height to fit viewport */
    @media(max-height:560px) and (max-width:700px) {
      :root {
        --bh: max(360px, calc(100svh - 56px));
        --pw: var(--bw);
      }
    }

    @media(prefers-reduced-motion:reduce) {

      *,
      *::before,
      *::after {
        animation-duration: .01ms !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>

      // Save
      let wishes = [];
      try { wishes = JSON.parse(localStorage.getItem('alora_wishes')) || []; } catch { }
      wishes.unshift({ name: name.slice(0, 50), text: text.slice(0, 200), ts: Date.now() });

    /* ════════════════════════════════════════════════════
       SPREADS
    ════════════════════════════════════════════════════ */
    const SPREADS = [
      { l: pgCoverLeft, r: pgCoverRight },
      { l: pgWelcome, r: pgBaptism },
      { l: pgBirthday, r: pgGodparents },
      { l: pgCountdown, r: pgRSVP },
      { l: pgMap, r: pgCalendar },
      { l: pgWishes, r: pgClosing },
    ];

    /* ════════════════════════════════════════════════════
       BOOK STATE & FLIP ENGINE
    ════════════════════════════════════════════════════ */
    let cur = 0, flipping = false;
    let mobilePage = 0; // 0=cover, then 1..11 = regular pages

    /* Mobile page count: 1 cover page + 2 pages per spread (excluding spread 0) */
    const TOTAL_MP = 1 + (SPREADS.length - 1) * 2; // 1 + 5*2 = 11

    function isMobile() { return window.innerWidth <= 700; }

    /* Mobile flattened page lookup */
    function getMobilePage(idx) {
      if (idx === 0) return pgMobileCover();
      // idx 1..10 maps to spread 1..5, each having l and r
      const adjIdx = idx - 1;
      const s = Math.floor(adjIdx / 2) + 1; // spread index (1..5)
      return adjIdx % 2 === 0 ? SPREADS[s].l() : SPREADS[s].r();
    }

    /* ── Desktop render ── */
    function renderSpread(n) {
      cur = n;
      document.getElementById('pg-l').innerHTML = SPREADS[n].l();
      document.getElementById('pg-r').innerHTML = SPREADS[n].r();
      updateNav(); updateDots(); initFeatures();
    }

    /* ── Mobile render (slide up/down) ── */
    function renderMobile(idx, dir) {
      mobilePage = idx;
      const bw = document.getElementById('book');
      const pgR = document.getElementById('pg-r');
      // Trigger slide animation direction
      bw.classList.remove('mob-slide-up', 'mob-slide-down');
      void bw.offsetWidth; // reflow
      bw.classList.add(dir > 0 ? 'mob-slide-up' : 'mob-slide-down');
      pgR.innerHTML = getMobilePage(idx);
      // Scroll to top of page
      window.scrollTo({ top: 0, behavior: 'smooth' });
      updateNav(); updateDots(); initFeatures();
    }

    /* ── Flip entry ── */
    function flip(dir) {
      if (flipping) return;
      if (isMobile()) {
        const next = mobilePage + dir;
        if (next < 0 || next >= TOTAL_MP) return;
        flipping = true;
        renderMobile(next, dir);
        setTimeout(() => { flipping = false; }, 340);
        return;
      }
      /* Desktop 3D flip */
      const next = cur + dir;
      if (next < 0 || next >= SPREADS.length) return;
      flipping = true;
      const flipper = document.getElementById('flipper');
      const ff = document.getElementById('ff');
      const fb = document.getElementById('fb');
      if (dir > 0) {
        document.getElementById('pg-r').innerHTML = SPREADS[next].r();
        ff.innerHTML = SPREADS[cur].r();
        fb.innerHTML = SPREADS[next].l();
        flipper.style.cssText = `left:50%;right:auto;top:0;width:var(--pw);height:var(--bh);transform-style:preserve-3d;z-index:10;display:block;transform-origin:left center;transform:rotateY(0deg);`;
        ff.style.borderRadius = '0 6px 6px 0';
        fb.style.borderRadius = '6px 0 0 6px';
        requestAnimationFrame(() => requestAnimationFrame(() => {
          flipper.style.transition = 'transform .88s cubic-bezier(.77,0,.18,1)';
          flipper.style.transform = 'rotateY(-180deg)';
        }));
        setTimeout(() => {
          document.getElementById('pg-l').innerHTML = SPREADS[next].l();
          flipper.style.cssText += 'display:none;';
          flipper.style.transition = 'none';
          cur = next; updateNav(); updateDots(); initFeatures(); flipping = false;
        }, 910);
      } else {
        document.getElementById('pg-l').innerHTML = SPREADS[next].l();
        ff.innerHTML = SPREADS[cur].l();
        fb.innerHTML = SPREADS[next].r();
        flipper.style.cssText = `left:0;right:auto;top:0;width:var(--pw);height:var(--bh);transform-style:preserve-3d;z-index:10;display:block;transform-origin:right center;transform:rotateY(0deg);`;
        ff.style.borderRadius = '6px 0 0 6px';
        fb.style.borderRadius = '0 6px 6px 0';
        requestAnimationFrame(() => requestAnimationFrame(() => {
          flipper.style.transition = 'transform .88s cubic-bezier(.77,0,.18,1)';
          flipper.style.transform = 'rotateY(180deg)';
        }));
        setTimeout(() => {
          document.getElementById('pg-r').innerHTML = SPREADS[next].r();
          flipper.style.cssText += 'display:none;';
          flipper.style.transition = 'none';
          cur = next; updateNav(); updateDots(); initFeatures(); flipping = false;
        }, 910);
      }
    }

    function updateNav() {
      if (isMobile()) {
        // No arrows on mobile — hide everything
        const bl = document.getElementById('btn-l');
        const br = document.getElementById('btn-r');
        if (bl) bl.style.display = 'none';
        if (br) br.style.display = 'none';
      } else {
        const bl = document.getElementById('btn-l');
        const br = document.getElementById('btn-r');
        if (bl) { bl.style.display = ''; bl.disabled = cur === 0; }
        if (br) { br.style.display = ''; br.disabled = cur === SPREADS.length - 1; }
      }
    }

    function updateDots() {
      const ind = document.getElementById('pg-ind');
      if (isMobile()) {
        ind.innerHTML = Array.from({ length: TOTAL_MP }, (_, i) =>
          `<div class="pg-dot${i === mobilePage ? ' on' : ''}" style="width:5px;height:5px;" onclick="jumpTo(${i})"></div>`
        ).join('');
      } else {
        ind.innerHTML = SPREADS.map((_, i) =>
          `<div class="pg-dot${i === cur ? ' on' : ''}" onclick="jumpTo(${i})"></div>`
        ).join('');
      }
    }

    function jumpTo(n) {
      if (flipping) return;
      if (isMobile()) {
        if (n === mobilePage) return;
        renderMobile(n, n > mobilePage ? 1 : -1);
      } else {
        if (n === cur) return;
        renderSpread(n);
      }
    }

    /* ════════════════════════════════════════════════════
       FEATURE INITIALIZERS  (called after each page render)
    ════════════════════════════════════════════════════ */
    let cdInterval = null;
    let selGuest = null;

    function initFeatures() {
      // Countdown
      if (document.getElementById('cd-d')) {
        startCountdown();
      } else {
        if (cdInterval) { clearInterval(cdInterval); cdInterval = null; }
      }
      // Guest search
      if (document.getElementById('g-inp')) initGuestSearch();
      // Restore RSVP
      if (document.getElementById('rsvp-rr')) restoreRSVP();
      // Wishes page — re-init (already rendered via innerHTML, nothing extra needed)
    }

    function startCountdown() {
      if (cdInterval) clearInterval(cdInterval);
      function tick() {
        const diff = new Date(ey, em - 1, ed, ...EV.time.split(':').map(Number)) - new Date();
        if (diff <= 0) { ['d', 'h', 'm', 's'].forEach(k => { const el = document.getElementById(`cd-${k}`); if (el) el.textContent = '✦'; }); return; }
        const p = n => String(Math.floor(n)).padStart(2, '0');
        const el = k => document.getElementById(`cd-${k}`);
        if (el('d')) el('d').textContent = p(diff / 86400000);
        if (el('h')) el('h').textContent = p((diff % 86400000) / 3600000);
        if (el('m')) el('m').textContent = p((diff % 3600000) / 60000);
        if (el('s')) el('s').textContent = p((diff % 60000) / 1000);
      }
      tick();
      cdInterval = setInterval(tick, 1000);
    }

    /* ── Guest Search ── */
    function initGuestSearch() {
      const inp = document.getElementById('g-inp');
      const drop = document.getElementById('g-drop');
      if (!inp || !drop) return;

      // Restore selected guest name
      if (selGuest) inp.value = selGuest.name;

      inp.addEventListener('input', () => {
        const q = inp.value.toLowerCase().trim();
        if (!q) { drop.classList.remove('on'); return; }
        const hits = GUESTS.filter(g => g.name.toLowerCase().includes(q)).slice(0, 7);
        if (!hits.length) { drop.classList.remove('on'); return; }
        drop.innerHTML = hits.map(g =>
          `<div class="gs-opt" onclick="pickGuest('${g.name.replace(/'/g, "\\'")}','${g.role}')">
         <span>${esc(g.name)}</span>
         <span class="bdg b-${g.role.toLowerCase()}">${g.role}</span>
       </div>`
        ).join('');
        drop.classList.add('on');
      });

      document.addEventListener('click', e => {
        if (!e.target.closest('.gs-wrap')) drop.classList.remove('on');
      }, { once: true });
    }

    function pickGuest(name, role) {
      selGuest = { name, role };
      const inp = document.getElementById('g-inp');
      const drop = document.getElementById('g-drop');
      if (inp) inp.value = name;
      if (drop) drop.classList.remove('on');

      const roleMap = {
        Ninong: { c: 'b-ninong', t: '🕊️ Ninong – Godfather' },
        Ninang: { c: 'b-ninang', t: '💐 Ninang – Godmother' },
        Witness: { c: 'b-witness', t: '✨ Witness' },
        Family: { c: 'b-family', t: '💕 Family' },
      };
      const ri = roleMap[role] || { c: 'b-family', t: `💖 ${role}` };
      const badge = document.getElementById('greet-badge');
      if (badge) badge.innerHTML = `<span class="bdg ${ri.c}" style="font-size:.72rem;padding:4px 12px;">${ri.t}</span>`;
    }

    /* ── RSVP ── */
    function doRSVP(status) {
      const fn = selGuest ? selGuest.name.split(' ')[0] : 'Valued Guest';
      try { localStorage.setItem('alora_rsvp', JSON.stringify({ name: selGuest?.name || 'Guest', status, ts: Date.now() })); } catch (e) { }

      const rr = document.getElementById('rsvp-rr');
      const rt = document.getElementById('rr-t');
      const rl = document.getElementById('rr-l');
      if (!rr) return;

      if (status === 'confirmed') {
        rr.className = 'rr on confirmed';
        rt.textContent = `See you there, ${fn}! 💖`;
        rl.innerHTML = calBtns();
        openModal('confirmed', fn);
      } else if (status === 'maybe') {
        rr.className = 'rr on maybe';
        rt.textContent = `We hope you can make it! 🌸`;
        rl.innerHTML = `<a href="${calURL()}" target="_blank" rel="noopener" class="btn btn-out btn-sm">📅 Save the Date</a>`;
        openModal('maybe', fn);
      } else {
        rr.className = 'rr on declined';
        rt.textContent = `We'll miss you! 💌`;
        rl.innerHTML = '';
        openModal('declined', fn);
      }
    }

    function restoreRSVP() {
      try {
        const sv = localStorage.getItem('alora_rsvp');
        if (!sv) return;
        const { name, status } = JSON.parse(sv);
        const fn = (name || 'Guest').split(' ')[0];
        const rr = document.getElementById('rsvp-rr');
        const rt = document.getElementById('rr-t');
        const rl = document.getElementById('rr-l');
        if (!rr) return;
        const msgs = { confirmed: { t: `You're confirmed, ${fn}! 💖` }, maybe: { t: `We hope to see you, ${fn}! 🌸` }, declined: { t: `We'll miss you, ${fn}! 💌` } };
        if (!msgs[status]) return;
        rr.className = `rr on ${status}`;
        rt.textContent = msgs[status].t;
        if (status === 'confirmed') rl.innerHTML = calBtns();
      } catch (e) { }
    }

    /* ── Modal ── */
    function openModal(status, fn) {
      const ico = document.getElementById('mIco');
      const ttl = document.getElementById('mTtl');
      const msg = document.getElementById('mMsg');
      const act = document.getElementById('mAct');
      if (status === 'confirmed') {
        ico.textContent = '✦'; ttl.textContent = `See you there, ${fn}!`;
        msg.textContent = "Your RSVP is in. We can't wait to celebrate with you!";
        act.innerHTML = calBtns() + `<button class="btn btn-ghost btn-sm" onclick="closeM()">Close</button>`;
      } else if (status === 'maybe') {
        ico.textContent = '✦'; ttl.textContent = `We hope to see you!`;
        msg.textContent = `Fingers crossed, ${fn}! Save the date just in case.`;
        act.innerHTML = `<a href="${calURL()}" target="_blank" rel="noopener" class="btn btn-rose btn-sm">Save the Date</a><button class="btn btn-ghost btn-sm" onclick="closeM()">Close</button>`;
      } else {
        ico.textContent = '✦'; ttl.textContent = `Thank you, ${fn}`;
        msg.textContent = "We understand. Your love means the world to Alora.";
        act.innerHTML = `<button class="btn btn-rose" onclick="closeM()">Send My Love</button>`;
      }
      document.getElementById('mOv').classList.add('on');
      document.body.style.overflow = 'hidden';
    }
    function closeM() { document.getElementById('mOv').classList.remove('on'); document.body.style.overflow = ''; }
    function mOut(e) { if (e.target === document.getElementById('mOv')) closeM(); }

    /* ── Messages ── */
    function getMsgs() { try { return JSON.parse(localStorage.getItem('alora_msgs')) || []; } catch { return []; } }
    function saveMsgs(m) { try { localStorage.setItem('alora_msgs', JSON.stringify(m.slice(0, 50))); } catch (e) { } }

    function sendMsg(btn) {
      const mn = document.getElementById('mn');
      const mt = document.getElementById('mt');
      const nm = mn?.value.trim(), tx = mt?.value.trim();
      if (!nm) { if (mn) mn.style.borderColor = 'var(--rose)'; setTimeout(() => { if (mn) mn.style.borderColor = ''; }, 2000); return; }
      if (!tx) { if (mt) mt.style.borderColor = 'var(--rose)'; setTimeout(() => { if (mt) mt.style.borderColor = ''; }, 2000); return; }
      const msgs = getMsgs();
      msgs.unshift({ name: nm.slice(0, 60), text: tx.slice(0, 280), ts: Date.now() });
      saveMsgs(msgs);
      if (mn) mn.value = ''; if (mt) mt.value = '';
      const list = document.getElementById('msgs-list');
      if (list) list.innerHTML = msgs.slice(0, 3).map(m => `<div class="mc"><div class="mc-auth">${esc(m.name)}</div><div class="mc-txt">"${esc(m.text)}"</div></div>`).join('');
      const orig = btn.innerHTML; btn.innerHTML = '✅ Sent!'; btn.disabled = true;
      setTimeout(() => { btn.innerHTML = orig; btn.disabled = false; }, 2200);
    }

    /* ── Music Player ── */
    let musicStarted = false;
    function toggleMusic() {
      const audio = document.getElementById('bg-audio');
      const btn = document.getElementById('mp-toggle');
      if (!audio) return;
      if (audio.paused) {
        audio.play().then(() => {
          btn.textContent = '⏸';
          musicStarted = true;
        }).catch(() => { });
      } else {
        audio.pause();
        btn.textContent = '▶';
      }
    }
    function setVol(v) {
      const audio = document.getElementById('bg-audio');
      if (audio) audio.volume = v;
    }
    /* Auto-start music on first interaction (bypass autoplay restrictions) */
    function tryAutoplay() {
      if (musicStarted) return;
      const audio = document.getElementById('bg-audio');
      if (!audio) return;
      audio.volume = 0.5;
      audio.play().then(() => {
        document.getElementById('mp-toggle').textContent = '⏸';
        musicStarted = true;
      }).catch(() => { });
      document.removeEventListener('click', tryAutoplay);
      document.removeEventListener('touchstart', tryAutoplay);
    }
    document.addEventListener('click', tryAutoplay, { once: true });
    document.addEventListener('touchstart', tryAutoplay, { once: true });

    /* ── Stars ── */
    function initStars() {
      const layer = document.getElementById('stars');
      for (let i = 0; i < 120; i++) {
        const s = document.createElement('div'); s.className = 'star';
        const sz = 1 + Math.random() * 2.5;
        const ta = .06 + Math.random() * .14, tb = .6 + Math.random() * .4;
        const td = 1.5 + Math.random() * 3.5, tl = -(Math.random() * td);
        s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random() * 100}%;top:${Math.random() * 100}%;--ta:${ta};--tb:${tb};--td:${td}s;--tl:${tl}s;`;
        layer.appendChild(s);
      }
    }
    function initFireflies() {
      const layer = document.getElementById('ffLayer');
      for (let i = 0; i < 22; i++) {
        const el = document.createElement('div'); el.className = 'fly';
        const fd = 6 + Math.random() * 8, fl = -(Math.random() * fd);
        const rx = () => ((Math.random() - .5) * 160 | 0) + 'px', ry = () => (-(Math.random() * 100 + 20) | 0) + 'px';
        el.style.cssText = `left:${Math.random() * 95}%;top:${40 + Math.random() * 55}%;--fd:${fd}s;--fl:${fl}s;--fx:${rx()};--fy:${ry()};--fx2:${rx()};--fy2:${ry()};--fx3:${rx()};--fy3:${ry()};`;
        layer.appendChild(el);
      }
    }

    /* ── Ambient butterflies ── */
    const BFC = [
      { u: 'rgba(252,221,239,.9)', l: 'rgba(247,184,208,.8)', b: '#C44678' },
      { u: 'rgba(237,224,248,.9)', l: 'rgba(200,168,224,.8)', b: '#7B4FAF' },
      { u: 'rgba(255,230,237,.9)', l: 'rgba(255,184,212,.8)', b: '#E05580' },
    ];
    function mkBF(c) {
      return `<svg viewBox="0 0 90 58"><ellipse class="awl" cx="22" cy="22" rx="20" ry="13" fill="${c.u}" stroke="${c.b}" stroke-width=".4"/><ellipse class="awr" cx="68" cy="22" rx="20" ry="13" fill="${c.u}" stroke="${c.b}" stroke-width=".4"/><ellipse class="awl" cx="24" cy="40" rx="13" ry="8" fill="${c.l}"/><ellipse class="awr" cx="66" cy="40" rx="13" ry="8" fill="${c.l}"/><ellipse cx="45" cy="29" rx="3" ry="13" fill="${c.b}"/><path d="M44,17 Q38,7 34,2" stroke="${c.b}" stroke-width="1.1" fill="none" stroke-linecap="round"/><path d="M46,17 Q52,7 56,2" stroke="${c.b}" stroke-width="1.1" fill="none" stroke-linecap="round"/><circle cx="34" cy="2" r="2" fill="${c.u}"/><circle cx="56" cy="2" r="2" fill="${c.u}"/></svg>`;
    }
    function spawnBF(layer, i) {
      const el = document.createElement('div'); el.className = 'abf';
      const sz = 28 + (i * 11) % 36, dur = 14 + (i * 3.7) % 10, del = -(i * dur / 10);
      const sy = (10 + (i * 37) % 80) + 'vh', ey = (10 + (i * 53) % 80) + 'vh';
      const op = .25 + (i * .04) % 0.25;
      el.style.cssText = `width:${sz}px;height:${sz}px;animation-duration:${dur}s;animation-delay:${del}s;--sy:${sy};--ey:${ey};--op:${op};`;
      el.innerHTML = mkBF(BFC[i % BFC.length]);
      layer.appendChild(el);
    }
    function initAmbient() {
      const layer = document.getElementById('bflies');
      for (let i = 0; i < (window.innerWidth < 600 ? 5 : 10); i++) spawnBF(layer, i);
    }

    /* ── Sparkles ── */
    const SPC = ['rgba(200,148,42,.9)', 'rgba(224,85,128,.7)', 'rgba(155,110,200,.7)', 'rgba(255,255,255,.8)'];
    function spawnSparkle() {
      const l = document.getElementById('spl');
      const s = document.createElement('div'); s.className = 'spk';
      const sz = 4 + Math.random() * 7, dur = 1 + Math.random() * 1.6;
      s.style.cssText = `left:${Math.random() * 97}%;top:${Math.random() * 94}%;width:${sz}px;height:${sz}px;background:${SPC[Math.floor(Math.random() * SPC.length)]};--sd:${dur}s;`;
      l.appendChild(s); setTimeout(() => s.remove(), (dur + .15) * 1000);
    }

    /* ── BOOT ── */
    document.addEventListener('DOMContentLoaded', () => {
      if (isMobile()) {
        mobilePage = 0; // start on full mobile cover
        document.getElementById('pg-r').innerHTML = getMobilePage(0);
        updateNav(); updateDots(); initFeatures();
      } else {
        renderSpread(0);
      }

      initStars();
      initFireflies();
      initAmbient();
      setInterval(spawnSparkle, 350);

      /* keyboard */
      document.addEventListener('keydown', e => {
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') flip(1);
        if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') flip(-1);
        if (e.key === 'Escape') closeM();
      });

      /* touch swipe — vertical on mobile, horizontal on desktop */
      let tx0 = 0, ty0 = 0;
      document.addEventListener('touchstart', e => {
        tx0 = e.touches[0].clientX;
        ty0 = e.touches[0].clientY;
      }, { passive: true });
      document.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - tx0;
        const dy = e.changedTouches[0].clientY - ty0;
        if (isMobile()) {
          // Vertical swipe: swipe UP = next page, swipe DOWN = prev page
          if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 40) flip(dy < 0 ? 1 : -1);
        } else {
          // Horizontal swipe on desktop
          if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 45) flip(dx > 0 ? -1 : 1);
        }
      }, { passive: true });

      /* scroll-to-turn-page on mobile */
      if (isMobile()) {
        let scrollLock = false;
        let lastScrollY = window.scrollY;
        window.addEventListener('scroll', () => {
          if (!isMobile() || scrollLock) return;
          const pgEl = document.getElementById('pg-r');
          if (!pgEl) return;
          const pageH = pgEl.scrollHeight;
          const scrolled = window.scrollY;
          const viewH = window.innerHeight;
          // Near bottom: go to next page
          if (scrolled + viewH >= pageH - 30 && mobilePage < TOTAL_MP - 1) {
            scrollLock = true;
            flip(1);
            setTimeout(() => { scrollLock = false; }, 700);
          }
          // Near top going up from scroll: go to prev page
          if (scrolled <= 0 && lastScrollY > 0 && mobilePage > 0) {
            scrollLock = true;
            flip(-1);
            setTimeout(() => { scrollLock = false; }, 700);
          }
          lastScrollY = scrolled;
        }, { passive: true });
      }

      /* resize: re-render in correct mode */
      let lastMobile = isMobile();
      window.addEventListener('resize', () => {
        const nowMobile = isMobile();
        if (nowMobile !== lastMobile) {
          lastMobile = nowMobile;
          if (nowMobile) {
            mobilePage = 0;
            document.getElementById('pg-r').innerHTML = getMobilePage(0);
            updateNav(); updateDots(); initFeatures();
          } else {
            renderSpread(0);
          }
        }
      });
    });
  </script>
</body>

</html>
